name: Release phrasePop
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install web dependencies
        run: npm install

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'phrasePop v__VERSION__'
          releaseBody: |
            ## What's Changed

            ### 🚀 New Features
            - **LM Studio Support**: PhrasePop now supports LM Studio and other OpenAI-compatible local AI providers.
            - **Model Discovery**: Auto-populate models from LM Studio using the standard `/v1/models` API. 
            - **Seamless URL Switching**: Switching to LM Studio automatically sets the default local port (1234).

            ### 🔧 Improvements
            - Enhanced settings UI for local provider configuration.
            - Improved error handling for stalled generation on slow models.

            ### 📦 Installation
            **Windows users:** Download `phrasePop___VERSION___x64_en-US.msi` from the assets below.
          releaseDraft: false
          prerelease: false
